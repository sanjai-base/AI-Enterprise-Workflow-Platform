name: Production Deploy

on:
  push:
    tags:
      - 'v*.*.*'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: workflow-platform

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:api-gateway-$IMAGE_TAG backend/api-gateway
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:api-gateway-$IMAGE_TAG

      - name: Update KubeConfig
        run: aws eks update-kubeconfig --name enterprise-workflow-cluster --region ${{ env.AWS_REGION }}

      - name: Deploy with Helm
        run: |
          helm upgrade --install workflow-platform infra/helm/workflow-chart \
            --namespace workflow-prod \
            --set image.tag=${{ github.ref_name }}
