name: PR Checks - CI Pipeline

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for better analysis
        
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build and run tests with Maven
      run: mvn -B verify --file backend/pom.xml
      
    - name: SonarQube Quality Gate check
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      run: |
        if [ ! -z "$SONAR_TOKEN" ]; then
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=enterprise-workflow-platform \
            --file backend/pom.xml
        else
          echo "Skipping SonarQube scan because SONAR_TOKEN is not set."
        fi
        
    - name: OWASP Dependency Check (Security Vulnerability Scan)
      uses: dependency-check/Dependency-Check_Action@main
      env:
        JAVA_HOME: /opt/jdk
      with:
        project: 'enterprise-workflow-platform'
        path: '.'
        format: 'HTML'
        out: 'reports'
        args: >
          --failOnCVSS 7
          --enableRetired
