server:
  port: 8085

spring:
  application:
    name: document-service
  datasource:
    url: jdbc:h2:mem:documentdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
